      <section class="content-section">
        <h2>MC Körskola för Limhamnbor</h2>
        <p>Bor du i Limhamn eller västra Malmö och vill ta MC-körkort? Andres Trafikskola betjänar hela Malmö inklusive Limhamn. Körundervisningen sker delvis i och runt Limhamnsområdet, vilket ger dig möjligheten att öva på de vägar och korsningar du känner igen från din vardag.</p>
        <p>Limhamn med sina lugna bostadskvarter, närheten till Öresund och de varierade trafikmiljöerna erbjuder utmärkta förutsättningar för MC-träning. Från smala stadsgator till lite öppnare landsvägsliknande sträckor – vi anpassar körningen för att du ska bli trygg i alla trafikmiljöer.</p>
        <p>Vi erbjuder alla typer av MC-körkort: A1 för lätta motorcyklar (16 år+), A2 för motorcyklar upp till 35kW (18 år+) och A för obegränsade motorcyklar (24 år+). Oavsett var i din motorcykelresa du befinner dig – nybörjare eller uppgraderare – hjälper vi dig ta rätt körkort på ett säkert och effektivt sätt.</p>
      </section>

      <section class="content-section">
        <h2>MC-tjänster för dig i Limhamn</h2>
        <ol class="step-list">
          <li>
            <strong>Introduktionslektion (790 kr)</strong>
            <p>80 minuter på bana för att lära dig grunderna och avgöra om MC-körning är något för dig. Perfekt för nybörjare.</p>
          </li>
          <li>
            <strong>MC-körlektion (990 kr/st)</strong>
            <p>80-minuterslektioner anpassade efter din nivå, från banaövningar till trafikkörning i Malmö och omgivningar.</p>
          </li>
          <li>
            <strong>Riskettan MC (750 kr)</strong>
            <p>Obligatorisk riskutbildning del 1. Teori om risker, alkohol, droger och MC-specifik säkerhet.</p>
          </li>
          <li>
            <strong>Risktvåan MC (3 200 kr)</strong>
            <p>Praktisk halkbaneövning – obligatorisk del 2. Lär dig nödbromsning och undanmanöver på halt underlag.</p>
          </li>
          <li>
            <strong>MC-paket (från 10 900 kr)</strong>
            <p>Välj ett av våra tre paket: MC Paket 1, 2 eller Intensiv. Inkluderar lektioner och i vissa paket riskutbildningar.</p>
          </li>
        </ol>
      </section>

      <div class="highlight-box">
        <h3>Körkortsuppgradering från A2 till A</h3>
        <p>Har du redan A2-körkort och fyllt 24 år? Du kan uppgradera till ett fullt A-körkort med ett kort tillägg. Kontakta oss för information om hur uppgraderingsprocessen ser ut och vad det kostar.</p>

      <section class="faq-section">
        <h2>Vanliga frågor</h2>
        <div class="faq-list">
          <div class="faq-item">
            <button class="faq-question" aria-expanded="false">Behöver jag åka till Ystadvägen 22B för lektionerna?</button>
            <div class="faq-answer">
              <p>Vi utgår normalt från vår trafikskola på Ystadvägen 22B i Malmö. Körning sker sedan i trafiken runt Malmö och Limhamn. Kontakta oss för att diskutera startplats och om det finns möjlighet till annan mötesplats.</p>
            </div>
          </div>
          <div class="faq-item">
            <button class="faq-question" aria-expanded="false">Kan jag ta MC-körkort om jag inte har bil-körkort?</button>
            <div class="faq-answer">
              <p>Ja, MC-körkort kan tas helt oberoende av bil-körkort. Du behöver inte ha B-körkort för att ta A1, A2 eller A-körkort. Många väljer faktiskt att ta MC-körkortet som sitt första körkort.</p>
            </div>
          </div>
          <div class="faq-item">
            <button class="faq-question" aria-expanded="false">Hur lång tid tar det att ta MC-körkort?</button>
            <div class="faq-answer">
              <p>Genomsnittligt tar det 3–6 månader beroende på hur ofta du kör och hur snabbt du lär dig. Med ett intensivpaket kan det gå snabbare, men det är viktigt att inte rusa igenom utbildningen – säkerhet kommer alltid först.</p>
            </div>
          </div>
          <div class="faq-item">
            <button class="faq-question" aria-expanded="false">Vilken skyddsutrustning behöver jag?</button>
            <div class="faq-answer">
              <p>Du behöver: godkänd motorcykelhjälm (ECE 22.06 eller liknande), MC-handskar, MC-jacka med rygg- och armbågsskydd, MC-byxor med knäskydd, och stövlar som täcker ankeln. Vi ger dig råd om utrustning om du är osäker.</p>
            </div>
          </div>
        </div>
      </section>
